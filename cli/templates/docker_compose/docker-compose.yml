services:
  app:
    build:
      args:
        appVersion: dev
      context: .
      dockerfile: Dockerfile
      target: dev
    restart: unless-stopped
    depends_on:
      - db
    volumes:
      - ./:/var/www
      - ./docker/php/file.ini:/usr/local/etc/php/conf.d/file.ini

  queue:
    image: ${APP_NAME}/cli:dev
    build:
      context: .
      dockerfile: cli.Dockerfile
      target: dev
    restart: unless-stopped
    depends_on:
      - app
      - db
    command: [ "php", "artisan", "queue:listen", "--queue=high,default" ]
    volumes:
      - ./:/var/www
      - ./docker/php/file.ini:/usr/local/etc/php/conf.d/file.ini

  #   scheduler:
  #     image: ${APP_NAME}/cli:dev
  #     restart: unless-stopped
  #     depends_on:
  #       - redis
  #       - app
  #       - db
  #     command: ["php", "artisan", "schedule:work"]
  #     env_file:
  #       - .env
  #     volumes:
  #       - vendor:/var/www/vendor
  #       - storage:/var/www/storage

  db:
    image: "mysql/mysql-server:8.0"
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: "admin143"
      MYSQL_DATABASE: "${DB_DATABASE}"
      MYSQL_USER: "${DB_USERNAME}"
      MYSQL_PASSWORD: "${DB_PASSWORD}"
    volumes:
      - ./mysql:/var/lib/mysql
    healthcheck:
      test: "mysqladmin ping -p${DB_PASSWORD}"
      retries: 3
      timeout: 5s

  nginx:
    build:
      context: .
      dockerfile: nginx.Dockerfile
      target: dev
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "${FORWARD_NGINX_PORT:-80}:80"
      # - 443:443 #https
    volumes:
      - ./:/var/www
      - ./docker/nginx/app.conf:/etc/nginx/conf.d/app.conf
      - ./docker/nginx/app_handler.conf:/etc/nginx/include/app_handler.conf
      # - ssl_cert:/etc/letsencrypt #ssl cert
    environment:
      - DISABLE_IPV6=true

  redis:
    image: "redis:alpine"
    restart: always
    volumes:
      - "redis:/data"
    healthcheck:
      test: "redis-cli ping"
      retries: 3
      timeout: 5s

  phpmyadmin:
    image: phpmyadmin
    restart: always
    depends_on:
      - db
    ports:
      - ${FORWARD_PHPMYADMIN_PORT:-8081}:80
    environment:
      - PMA_HOST=db

  node:
    image: node:18
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./:/app
      - ./node_modules:/app/node_modules
    command: [ "sleep", "infinity" ]

  vite:
    build:
      context: .
      dockerfile: vite.Dockerfile
    restart: unless-stopped
    ports:
      - 5173:5173
    volumes:
      - ./:/app
      - ./node_modules:/app/node_modules
    command: [ "npm", "run", "dev" ]

  mailpit:
    image: axllent/mailpit
    restart: unless-stopped
    ports:
      - 8025:8025
      - 1025:1025
    environment:
      MP_MAX_MESSAGES: 5000
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1

  soketi:
    image: quay.io/soketi/soketi:latest
    restart: unless-stopped
    ports:
      - 9601:9601
      - 6001:6001
    environment:
      - SOKETI_DEBUG=true
      - SOKETI_METRICS_SERVER_PORT=9601
      - SOKETI_DEFAULT_APP_ID=${PUSHER_APP_ID}
      - SOKETI_DEFAULT_APP_KEY=${PUSHER_APP_KEY}
      - SOKETI_DEFAULT_APP_SECRET=${PUSHER_APP_SECRET}

  reverb:
    image: ${APP_NAME}/cli:dev
    container_name: reverb
    restart: unless-stopped
    depends_on:
      - queue
    command: [ "php", "artisan", "reverb:start" ]
    ports:
      - "8080:8080"
    environment:
      - REVERB_HOST=0.0.0.0
      - REVERB_PORT=8080
      - REVERB_SCHEME=http

volumes:
  redis:
    driver: local
  meilisearch:
    driver: local
