name: release

on:
  push:
    branches:
      - enhance-cli

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      # We extract the release info for the 'cli' path specifically
      release_created: ${{ steps.release.outputs['cli--release_created'] }}
      tag_name: ${{ steps.release.outputs['cli--tag_name'] }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          # Configuration for monorepo is best handled via the config file below
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
      - name: Print release outputs for debugging
        continue-on-error: true
        run: |
          echo "Release outputs:"
          echo "${{ toJson(steps.release.outputs) }}"

  build-release-assets:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Install dependencies
        working-directory: ./cli # Target the cli folder
        run: dart pub get

      - name: Generate Assets
        working-directory: ./cli
        run: dart run tool/generate_assets.dart

      - name: Compile CLI
        working-directory: ./cli
        run: |
          mkdir -p build
          dart compile exe bin/cli.dart -o build/cli.sh

      - name: Upload Binary to Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ needs.release-please.outputs.tag_name }} ./cli/build/cli.sh --clobber